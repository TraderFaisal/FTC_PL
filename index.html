<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTrader Pro | Trader Faisal</title>
    <style>
        :root {
            --bg: #050508;
            --neon-blue: #00f2ff;
            --neon-pink: #ff0055;
            --neon-green: #00ff88;
            --glass: rgba(20, 20, 30, 0.95);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        #licenseScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }

        .license-box {
            width: 320px; padding: 30px; background: var(--glass);
            border: 2px solid var(--neon-blue); border-radius: 20px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .main-card {
            width: 380px; background: var(--glass); padding: 25px;
            border-radius: 20px; border: 2px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); display: none; 
            backdrop-filter: blur(15px);
        }

        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; font-family: 'Orbitron'; outline: none; box-sizing: border-box; margin-top: 5px;}
        label { font-size: 10px; color: var(--neon-blue); text-transform: uppercase; margin-top: 15px; display: block; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; transition: 0.2s; }
        
        .win-btn { background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); }
        .loss-btn { background: transparent; color: var(--neon-pink); border: 2px solid var(--neon-pink); }
        .end-btn { grid-column: span 2; margin-top: 15px; background: linear-gradient(45deg, #00f2ff, #00ff88); color: #000; }

        #uidDisplayBox {
            display: none; margin-top: 20px; width: 380px; background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--neon-blue); border-radius: 15px; padding: 15px; text-align: center; box-sizing: border-box;
        }

        .copy-btn { background: var(--neon-blue); border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; }

        #successToast {
            position: fixed; top: 20px; background: var(--neon-green); color: #000;
            padding: 12px 25px; border-radius: 50px; font-weight: bold; display: none; z-index: 10001;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="licenseScreen">
    <div class="license-box">
        <h2 style="color: var(--neon-blue);">SYSTEM LOCKED</h2>
        <input type="text" id="licenseInput" placeholder="Enter License Key...">
        <button class="win-btn" style="width: 100%; margin-top: 20px;" onclick="checkLicense()">ACTIVATE</button>
    </div>
</div>

<div id="successToast">Successfully Sent to Group!</div>

<div class="main-card" id="card">
    <div style="text-align: center; margin-bottom: 20px;">
        <label>Current Live Balance</label>
        <h1 id="displayBal" style="font-size: 45px; margin: 5px 0; color: var(--neon-green);">$100.00</h1>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div><label>Start Bal</label><input type="number" id="setBal" value="100" oninput="resetSession()"></div>
        <div><label>Trade Amt</label><input type="number" id="tradeAmt" value="1"></div>
        <div><label>Payout %</label><input type="number" id="payout" value="85"></div>
        <div><label>MTG Multi</label><input type="number" id="multiplier" value="2.2"></div>
    </div>

    <div class="action-btns">
        <button class="win-btn" onclick="tradeResult('WIN')">ITM (Win)</button>
        <button class="loss-btn" onclick="tradeResult('LOSS')">OTM (Loss)</button>
        <button class="end-btn" onclick="initiateEndSession()">End Session & Send Report</button>
    </div>
</div>

<div id="uidDisplayBox">
    <label style="color: var(--neon-blue);">YOUR SESSION UID</label>
    <h2 id="uidText" style="letter-spacing: 4px; margin: 10px 0;">------</h2>
    <button class="copy-btn" onclick="copyUID()">COPY UID</button>
</div>

<script>
    const BOT_TOKEN = '7785848958:AAFnK1gZBfXJemeZDIgBwkZ5eTR0htC8hOI';
    const CHAT_ID = '-1003489711313';

    let balance = 100, wins = 0, losses = 0, isMTG = false;

    // --- Optimized Sound Engine ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function checkLicense() {
        if(document.getElementById('licenseInput').value.trim() !== "") {
            playSound(880);
            document.getElementById('licenseScreen').style.display = 'none';
            document.getElementById('card').style.display = 'block';
        }
    }

    function tradeResult(type) {
        let base = parseFloat(document.getElementById('tradeAmt').value);
        let mult = parseFloat(document.getElementById('multiplier').value);
        let pay = parseFloat(document.getElementById('payout').value) / 100;
        let currentBet = isMTG ? (base * mult) : base;

        if(type === 'WIN') {
            balance += (currentBet * pay); wins++; isMTG = false; playSound(1200);
        } else {
            balance -= currentBet; losses++; isMTG = true; playSound(400);
        }
        document.getElementById('displayBal').innerText = "$" + balance.toFixed(2);
    }

    function initiateEndSession() {
        let user = prompt("Enter TRADER USERNAME:");
        if (!user) return;
        
        let uid = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('uidText').innerText = uid;
        document.getElementById('uidDisplayBox').style.display = 'block';
        
        sendStatement(user, uid);
    }

    function copyUID() {
        const uid = document.getElementById('uidText').innerText;
        navigator.clipboard.writeText(uid).then(() => {
            alert("UID Copied: " + uid);
        });
    }

    async function sendStatement(user, uid) {
        const start = parseFloat(document.getElementById('setBal').value);
        const pnl = (balance - start).toFixed(2);
        const wr = (wins + losses === 0) ? "0%" : ((wins / (wins + losses)) * 100).toFixed(1) + "%";

        const message = `🚀 **TRADER FAISAL STATEMENT**\n` +
                        `━━━━━━━━━━━━━━━━\n` +
                        `💰 **Initial:** $${start}\n` +
                        `💵 **Final:** $${balance.toFixed(2)}\n` +
                        `📊 **PnL:** ${pnl >= 0 ? '✅ PROFIT' : '❌ LOSS'} ($${pnl})\n` +
                        `━━━━━━━━━━━━━━━━\n` +
                        `✅ Wins: ${wins} | ❌ Loss: ${losses}\n` +
                        `🎯 WinRate: ${wr}\n` +
                        `━━━━━━━━━━━━━━━━\n` +
                        `👤 **TRADER USERNAME :** ${user}\n` +
                        `🆔 **UID :** ${uid}\n` +
                        `━━━━━━━━━━━━━━━━\n` +
                        `🤖 *Dev: TRADER FAISAL AHMED*`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            });

            const data = await response.json();
            if (data.ok) {
                const toast = document.getElementById('successToast');
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 4000);
            } else {
                alert("Telegram Error: " + data.description);
            }
        } catch (error) {
            alert("Connection Failed! Please check your Internet.");
        }
    }

    function resetSession() {
        balance = parseFloat(document.getElementById('setBal').value) || 100;
        wins = 0; losses = 0; isMTG = false;
        document.getElementById('displayBal').innerText = "$" + balance.toFixed(2);
        document.getElementById('uidDisplayBox').style.display = 'none';
    }
</script>
</body>
</html>
